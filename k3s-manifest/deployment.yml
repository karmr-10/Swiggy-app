apiVersion: apps/v1
kind: Deployment

metadata:
  name: swiggy-app
  namespace: poojitha

spec:
  replicas: 2

  selector:
    matchLabels:
      app: swiggy-app

  template:
    metadata:
      labels:
        app: swiggy-app

    spec:
      containers:
      - name: swiggy-app
        image: dockkart2025/swiggy:latest

        env:
        - name: HOST
          value: "0.0.0.0"

        - name: PORT
          value: "5000"

        ports:
        - containerPort: 5000




